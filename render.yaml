services:
  - type: web
    name: garbage-duty-assigner
    runtime: node
    plan: starter
    region: virginia
    branch: main
    autoDeployTrigger: commit
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: APP_TIMEZONE
        value: America/Halifax
      - key: SCHEDULE_SOURCE
        value: halifax
      - key: STATE_FILE
        value: ./data/state.json
      - key: HALIFAX_IMPORT_FILE
        value: ./data/halifaxImport.json
      - key: HOUSE_ADDRESS
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: HALIFAX_PLACE_ID
        sync: false
    disk:
      name: app-data
      mountPath: /opt/render/project/src/data
      sizeGB: 5
