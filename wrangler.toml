name = "garbage-duty-assigner"
main = "src/worker.ts"
compatibility_date = "2026-03-15"

[vars]
APP_TIMEZONE = "America/Halifax"
SCHEDULE_SOURCE = "halifax"

[[d1_databases]]
binding = "DB"
database_name = "garbage-duty-assigner"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

[triggers]
crons = ["5 14,15,16,17 * * *"]
